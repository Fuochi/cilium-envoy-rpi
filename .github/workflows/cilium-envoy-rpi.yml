name: cilium-envoy-arm64-rpi

on:
  schedule:
    - cron: '0 4 * * *' # daily, 04:00 UTC
  workflow_dispatch:
    inputs:
      force_all:
        description: Rebuild every matrix entry, even if already on GHCR
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: cilium-envoy-rpi
  cancel-in-progress: false # one run at a time; don't stack a manual run on the cron

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{github.repository_owner}}/cilium-envoy
  OWNER: ${{github.repository_owner}}
  UPSTREAM: cilium/proxy
  LATEST_PATCH_ONLY: 'true' # "false" = build every patch in the matrix
  # NOTE: OWNER/IMAGE_NAME below may contain uppercase (e.g. "Fuochi"). GHCR
  # requires lowercase repo names, so each job re-derives a lowercase OWNER in
  # a "Normalize owner" step before any image tag is built.

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{steps.parse.outputs.matrix}}
      any: ${{steps.parse.outputs.any}}
    steps:
      - name: Normalize owner (GHCR repo names must be lowercase)
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Checkout (for tools/parse_matrix.py)
        uses: actions/checkout@v4

      - name: Fetch upstream compatibility matrix
        run: curl -fsSL "https://raw.githubusercontent.com/${UPSTREAM}/main/README.md" -o README.upstream.md

      - name: Parse matrix & compute work list
        id: parse
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
          FORCE_ALL: ${{inputs.force_all}}
        run: python3 tools/parse_matrix.py README.upstream.md

  build:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-24.04-arm # NATIVE arm64 runner (free on public repos). gperftools must be compiled on real arm64 -- QEMU/cross builds of it fail.
    timeout-minutes: 350 # GitHub hard-cancels hosted jobs at 6h; stop short so the cache post-step still runs
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{fromJSON(needs.detect.outputs.matrix)}}
    steps:
      - name: Checkout cilium/proxy @ ${{matrix.branch}}
        uses: actions/checkout@v4
        with:
          repository: cilium/proxy
          ref: ${{matrix.branch}}
          fetch-depth: 1

      - name: Normalize owner / image name (GHCR repo names must be lowercase)
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "OWNER=$owner_lc" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$owner_lc/cilium-envoy" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Add swap (lets us raise Bazel --jobs without OOM on the 16 GB runner)
        run: |
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Restore & persist Bazel cache across runs (resumes after a timeout)
        # Persists BuildKit's id=arm64 cache mount (/cilium/proxy/.cache). Bazel's
        # disk cache keeps COMPLETED actions, so a cancelled run resumes next time.
        # Saves in a post-step (best-effort on timeout). Pin to the latest v3 tag.
        uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          cache-map: |
            { "bazel-cache": { "target": "/cilium/proxy/.cache", "id": "arm64" } }
          cache-key: bazel-arm64-${{matrix.envoy}}

      - name: Build cilium-envoy (arm64, Raspberry Pi / gperftools)
        run: |
          # Do NOT set DOCKER_DEV_ACCOUNT. It controls where the prebuilt
          # BUILDER_BASE + ARCHIVE_IMAGE cache images are PULLED from. Left at
          # the upstream default (quay.io/cilium), Bazel reuses that public
          # cache and only rebuilds the gperftools-affected targets. We retag
          # and push the finished image to GHCR ourselves in the next step.
          # Runs on a NATIVE arm64 runner, so gperftools is compiled on real
          # arm64 hardware (the supported path) -- no QEMU/cross emulation.
          ARCH=arm64 \
          BAZEL_BUILD_OPTS="--define tcmalloc=gperftools --jobs=4 --local_ram_resources=HOST_RAM*.6" \
          DOCKER_BUILD_OPTS="--output=type=docker" \
          make docker-image-envoy
          # Capture the freshly built local image (exclude the *-builder images)
          built="$(docker images --format '{{.Repository}}:{{.Tag}}' | grep '/cilium-envoy:' | grep -v -- '-builder' | head -n1)"
          echo "Built local image: $built"
          echo "BUILT_IMAGE=$built" >> "$GITHUB_ENV"

      - name: Tag & push to GHCR
        run: |
          base="${REGISTRY}/${IMAGE_NAME}"
          envoy="${{matrix.envoy}}"
          docker tag  "$BUILT_IMAGE" "${base}:${envoy}-arm64-rpi"
          docker push "${base}:${envoy}-arm64-rpi"
          for c in ${{matrix.ciliums}}; do
            docker tag  "$BUILT_IMAGE" "${base}:cilium-${c}-arm64-rpi"
            docker push "${base}:cilium-${c}-arm64-rpi"
          done
